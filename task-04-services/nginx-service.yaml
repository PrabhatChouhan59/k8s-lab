# Task 04 - Services
# Expose the nginx Deployment using ClusterIP (internal) and NodePort (external) services.

---
# ClusterIP Service — accessible only within the cluster
apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip
  namespace: k8s-lab
  labels:
    app: nginx
    task: "04-services"
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - name: http
      protocol: TCP
      port: 80        # Port exposed on the Service (inside cluster)
      targetPort: 80  # Port on the Pod containers

---
# NodePort Service — accessible from outside the cluster via <NodeIP>:<NodePort>
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: k8s-lab
  labels:
    app: nginx
    task: "04-services"
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      protocol: TCP
      port: 80          # ClusterIP port (internal)
      targetPort: 80    # Pod port
      nodePort: 30080   # External port on every Node (range: 30000–32767)
