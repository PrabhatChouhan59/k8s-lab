# Task 08 - Volumes & Persistent Storage
# Create a PersistentVolume (PV), claim it with a PersistentVolumeClaim (PVC),
# and attach the PVC to a Pod. Data persists even if the Pod is deleted.

---
# PersistentVolume: Cluster-level storage resource (provisioned by admin)
# Uses hostPath for local Kind/Minikube testing.
# In production: replace with AWS EBS, GCE PD, Azure Disk, NFS, etc.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: lab-pv
  labels:
    task: "08-volumes"
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce    # Can be mounted read-write by a single Node
  hostPath:
    path: /tmp/k8s-lab-data   # Directory on the Node (for local testing only)
  persistentVolumeReclaimPolicy: Retain
  # Retain: Keep data after PVC is deleted (admin must manually clean up)
  # Delete: Auto-delete storage when PVC is deleted (common in cloud)
  # Recycle: Scrub and reuse (deprecated)

---
# PersistentVolumeClaim: Namespace-scoped request for storage
# A PVC finds a matching PV and binds to it.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lab-pvc
  namespace: k8s-lab
  labels:
    task: "08-volumes"
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi   # Must be <= PV capacity (1Gi)

---
# Pod: Mounts the PVC and writes data that survives Pod deletion
apiVersion: v1
kind: Pod
metadata:
  name: storage-demo
  namespace: k8s-lab
  labels:
    app: storage-demo
    task: "08-volumes"
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Pod started at: $(date)" >> /data/log.txt
          echo "Writing persistent data..." >> /data/log.txt
          while true; do
            echo "Heartbeat: $(date)" >> /data/log.txt
            sleep 10
          done
      volumeMounts:
        - name: persistent-storage
          mountPath: /data    # PVC mounted here inside the container

      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"

  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: lab-pvc    # References the PVC by name
