# Task 07 - Secrets
# Store sensitive data (passwords, tokens, keys) in Kubernetes Secrets.
# Inject them as env vars and volume mounts — never hardcode in YAML.
#
# NOTE: Secret values in YAML must be base64 encoded.
# Generate them with: echo -n 'myvalue' | base64
#
# Values used here:
#   db-password: myS3cr3tP@ss  → bXlTM2NyM3RQQHNz
#   api-key: abcd-1234-efgh    → YWJjZC0xMjM0LWVmZ2g=
#   username: admin             → YWRtaW4=

---
# Opaque Secret (generic — most common type)
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: k8s-lab
  labels:
    task: "07-secrets"
type: Opaque
data:
  db-password: bXlTM2NyM3RQQHNz    # base64("myS3cr3tP@ss")
  api-key: YWJjZC0xMjM0LWVmZ2g=    # base64("abcd-1234-efgh")
  username: YWRtaW4=                 # base64("admin")

---
# TLS Secret (stores a TLS certificate and private key)
# In real use: kubectl create secret tls my-tls --cert=tls.crt --key=tls.key
apiVersion: v1
kind: Secret
metadata:
  name: app-tls-secret
  namespace: k8s-lab
  labels:
    task: "07-secrets"
type: kubernetes.io/tls
data:
  # Placeholder base64 values — replace with real cert/key in production
  tls.crt: LS0tLS1CRUdJTi==    # base64 of your TLS certificate
  tls.key: LS0tLS1CRUdJTi==    # base64 of your private key

---
# Pod that consumes Secrets via env vars AND volume mounts
apiVersion: v1
kind: Pod
metadata:
  name: secret-demo
  namespace: k8s-lab
  labels:
    app: secret-demo
    task: "07-secrets"
spec:
  containers:
    - name: app
      image: nginx:1.25-alpine

      # Method 1: Inject specific Secret keys as env vars
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: db-password
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: api-key
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: username

      # Method 2: Mount Secret as files (more secure — values never in env)
      volumeMounts:
        - name: secret-volume
          mountPath: /etc/secrets
          readOnly: true

      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "64Mi"

  volumes:
    - name: secret-volume
      secret:
        secretName: app-secret
        defaultMode: 0400  # Read-only by owner only (secure file permissions)
