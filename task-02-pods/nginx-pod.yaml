# Task 02 - Pods
# Run a simple nginx web server Pod, inspect it, view logs, then delete it.

---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: k8s-lab
  labels:
    app: nginx
    task: "02-pods"
  annotations:
    description: "A basic nginx Pod for learning purposes"
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
          name: http
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 10
        periodSeconds: 10
  restartPolicy: Always
